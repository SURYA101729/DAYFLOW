databases:
  - name: dayflow-db
    plan: free
    databaseName: dayflow_db
    user: dayflow_user

services:
  - type: web
    name: dayflow-backend
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dayflow-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: dayflow-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: dayflow-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CLAUDE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://dayflow-surya.vercel.app
      - key: PORT
        value: 8080
