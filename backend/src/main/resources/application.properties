# ===========================
# DayFlow Application Config
# ===========================
spring.application.name=dayflow
server.port=${PORT:8080}

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dayflow_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.maximum-pool-size=5

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=${JWT_SECRET:dayflow_super_secret_jwt_key_that_is_at_least_256_bits_long_for_hmac_sha256}
jwt.expiration=86400000

# Claude AI Configuration
claude.api.key=${CLAUDE_API_KEY:your_claude_api_key}
claude.api.url=https://api.anthropic.com/v1/messages
claude.api.model=claude-sonnet-4-20250514

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# Rate Limiting
app.advice.rate-limit=10

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
